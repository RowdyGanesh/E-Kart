# CI Pipeline: Build Java App + Create Docker Image
name: Java CI with Maven

# Trigger workflow on push & PR to GH-Actions branch
on:
  push:
    branches: [ "GH-Actions" ]
  pull_request:
    branches: [ "GH-Actions" ]

jobs:
  build:

    # Use Ubuntu runner provided by GitHub
    runs-on: ubuntu-latest

    steps:
    # Checkout source code from repository
    - uses: actions/checkout@v4

    # Install and configure Java 8
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    # Build application using Maven    
    - name: Build with Maven
      run: mvn -B clean package -Dmaven.test.skip=true --file pom.xml

    # Build Docker Image
    - name: Build Docker Image
      run: docker build -t ecart-service:${{ github.sha }} .